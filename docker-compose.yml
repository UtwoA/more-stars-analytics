services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: more_stars
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"

  app:
    build: .
    command: bundle exec puma -C config/puma.rb
    env_file:
      - .env
    environment:
      RAILS_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://analytics:analytics@db:5432/more_stars}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PORT: 3000
    ports:
      - "3001:3000"
    depends_on:
      - db
      - redis

  sidekiq:
    build: .
    command: bundle exec sidekiq -C config/sidekiq.yml
    env_file:
      - .env
    environment:
      RAILS_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://analytics:analytics@db:5432/more_stars}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - db
      - redis

volumes:
  pgdata:

