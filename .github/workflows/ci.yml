name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/more_stars_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/more_stars_test
      REDIS_URL: redis://localhost:6379/0
      DASHBOARD_PASSWORD: test-password
      DASHBOARD_2FA_SECRET: JBSWY3DPEHPK3PXP
      SESSION_COOKIE_SECURE: false
      GIFT_DEFAULT_COST_RUB: 60

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: more_stars_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d more_stars_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.1"
          bundler-cache: true

      - name: DB migrate
        run: bundle exec rails db:migrate

      - name: Run tests
        run: bundle exec rspec
